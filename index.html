<meta charset="UTF-8">

<style>
  :root{
    --nucleus:#e8412e;
    --cyan:#5ab8c8;
    --brick:#c0492e;
    --yellow:#f2c230;
    --green:#3e9e5a;
    --blue:#a8dce8;
    --orange:#f2934a;
    --gold:#eeb902;

    --ink:#ffffff;
    --muted:#c4cdda;
    --bg0:#0a1020;
    --bg1:#101a33;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Manrope',sans-serif;
    background:
      radial-gradient(1200px 800px at 72% -10%, #1b2b54 0%, transparent 55%),
      radial-gradient(900px 700px at 8% 110%, #16224a 0%, transparent 50%),
      linear-gradient(160deg, var(--bg1) 0%, var(--bg0) 75%);
    color:var(--ink);
    overflow:hidden;
    position:relative;
  }

  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 120% at 50% 50%, transparent 58%, rgba(0,0,0,.45) 100%);
  }

  #scene{position:fixed;inset:0;z-index:1;display:block}

  .wrap{
    position:relative;z-index:4;
    min-height:100vh;
    display:flex;flex-direction:column;
    padding:clamp(22px,4vw,48px);
    pointer-events:none;
  }
  .wrap *{pointer-events:auto}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .logo-plate{
    background:#ffffff;border-radius:14px;padding:11px 18px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);display:inline-flex;align-items:center;
  }
  .logo-plate svg{display:block;height:clamp(34px,4.4vw,46px);width:auto}
  .top .status{
    font-size:12.5px;letter-spacing:.14em;font-weight:600;
    color:var(--muted);display:flex;align-items:center;gap:9px;text-transform:uppercase;
  }
  .top .status i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1.6s infinite}

  /* center content */
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:780px}
  .eyebrow{
    font-size:clamp(12px,1.2vw,14px);font-weight:700;
    letter-spacing:.3em;text-transform:uppercase;color:var(--cyan);
    margin-bottom:22px;opacity:0;animation:rise .9s .2s forwards;
  }
  h1{
    font-weight:800;
    font-size:clamp(44px,8.5vw,108px);line-height:.98;letter-spacing:-.02em;
    text-transform:uppercase;
  }
  h1 .l{display:inline-block;opacity:0;transform:translateY(40px);animation:rise .9s forwards}
  h1 .grad{
    background:linear-gradient(100deg,var(--yellow),var(--orange) 45%,var(--nucleus) 80%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{
    margin-top:26px;max-width:540px;font-weight:400;
    font-size:clamp(16px,1.7vw,20px);line-height:1.65;color:#dde3ee;
    opacity:0;animation:rise .9s .8s forwards;
  }
  .sub b{font-weight:700;color:var(--ink)}

  /* loading animation */
  .loading{
    margin-top:44px;display:flex;align-items:center;gap:16px;
    opacity:0;animation:rise .9s 1s forwards;
  }
  .loader{width:34px;height:34px;position:relative;flex:none}
  .loader span{
    position:absolute;inset:0;border-radius:50%;border:3px solid transparent;
    animation:spin 1.1s linear infinite;
  }
  .loader span:nth-child(1){border-top-color:var(--cyan)}
  .loader span:nth-child(2){border-top-color:var(--yellow);animation-duration:1.5s;inset:5px}
  .loader span:nth-child(3){border-top-color:var(--orange);animation-duration:1.9s;inset:10px}
  .loading .txt{font-size:14.5px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .loading .txt .dots::after{content:"";animation:dots 1.6s steps(4,end) infinite}

  /* bottom */
  .bottom{display:flex;justify-content:flex-end;align-items:flex-end;gap:16px;flex-wrap:wrap;
    opacity:0;animation:rise .9s 1.3s forwards}
  .socials{display:flex;gap:10px}
  .socials a{
    display:flex;align-items:center;gap:10px;height:44px;padding:0 18px;border-radius:13px;
    border:1px solid rgba(255,255,255,.18);color:var(--ink);text-decoration:none;
    font-weight:700;font-size:14.5px;transition:.25s;background:rgba(255,255,255,.05);
  }
  .socials a svg{width:20px;height:20px;flex:none}
  .socials a:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 8px 22px rgba(90,184,200,.3);background:rgba(90,184,200,.1)}

  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.25);opacity:.7}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}

  @media(max-width:640px){
    .center{justify-content:flex-end;padding-bottom:8px}
    .sub{max-width:100%}
    .bottom{justify-content:flex-start}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.01ms!important}
    .loader span{animation:spin 1.1s linear infinite!important}
  }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('scene');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(50,1,0.1,200);
  camera.position.set(0,0,9.2);

  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const nLight=new THREE.PointLight(0xff6a4a,3.2,60);scene.add(nLight);
  const dir=new THREE.DirectionalLight(0xcfe4ff,0.75);dir.position.set(6,7,8);scene.add(dir);

  const atom=new THREE.Group();scene.add(atom);

  function halo(rgba,size){
    const c=document.createElement('canvas');c.width=c.height=128;
    const x=c.getContext('2d');
    const g=x.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0,rgba.replace('A','0.95'));
    g.addColorStop(.35,rgba.replace('A','0.45'));
    g.addColorStop(1,rgba.replace('A','0'));
    x.fillStyle=g;x.fillRect(0,0,128,128);
    const tex=new THREE.CanvasTexture(c);
    const m=new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false});
    const s=new THREE.Sprite(m);s.scale.set(size,size,1);return s;
  }

  const nucleus=new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.15,5),
    new THREE.MeshStandardMaterial({color:0xe8412e,emissive:0xb31f10,emissiveIntensity:.95,roughness:.3,metalness:.15})
  );atom.add(nucleus);
  const nHalo=halo('rgba(255,90,60,A)',6.5);atom.add(nHalo);

  const orbits=[
    {ring:0x5ab8c8, e:0xa8dce8, tilt:[ 0.18, 0.0, 0.10], speed: 0.85, R:3.05},
    {ring:0xc0492e, e:0x3e9e5a, tilt:[ 1.30, 0.55, 0.0 ], speed:-0.62, R:3.25},
    {ring:0xf2c230, e:0xf2934a, tilt:[ 1.05,-0.85, 0.30], speed: 0.50, R:3.45}
  ];
  const haloRGBA={0xa8dce8:'rgba(168,220,232,A)',0x3e9e5a:'rgba(80,200,120,A)',0xf2934a:'rgba(255,150,80,A)'};
  const electrons=[];

  orbits.forEach(o=>{
    const pivot=new THREE.Group();
    pivot.rotation.set(o.tilt[0],o.tilt[1],o.tilt[2]);
    atom.add(pivot);
    pivot.add(new THREE.Mesh(
      new THREE.TorusGeometry(o.R,0.045,18,160),
      new THREE.MeshStandardMaterial({color:o.ring,emissive:o.ring,emissiveIntensity:.55,roughness:.4,metalness:.2})
    ));
    const holder=new THREE.Group();pivot.add(holder);
    const el=new THREE.Mesh(
      new THREE.SphereGeometry(0.27,32,32),
      new THREE.MeshStandardMaterial({color:o.e,emissive:o.e,emissiveIntensity:.8,roughness:.25,metalness:.2})
    );
    el.position.x=o.R;holder.add(el);
    el.add(halo(haloRGBA[o.e],1.7));
    electrons.push({holder,speed:o.speed});
  });

  const N=1400,pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=18+Math.random()*55, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(ph);
  }
  const starGeo=new THREE.BufferGeometry();
  starGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xdbe6ff,size:0.12,transparent:true,opacity:.8,sizeAttenuation:true}));
  scene.add(stars);

  let mx=0,my=0,tx=0,ty=0;
  window.addEventListener('pointermove',e=>{
    tx=(e.clientX/window.innerWidth-0.5);
    ty=(e.clientY/window.innerHeight-0.5);
  });

  function resize(){
    const w=window.innerWidth,h=window.innerHeight;
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.position.x=0;
    /* geser atom ke kanan; pada layar sempit kembali ke tengah */
    atom.position.x = w>1100 ? 3.6 : (w>720 ? 2.3 : 0);
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize',resize);resize();

  const clock=new THREE.Clock();
  function loop(){
    const t=clock.getElapsedTime();
    mx+=(tx-mx)*0.05;my+=(ty-my)*0.05;
    atom.rotation.y=t*0.18+mx*0.6;
    atom.rotation.x=Math.sin(t*0.25)*0.12 - my*0.5;
    electrons.forEach(o=>o.holder.rotation.z=t*o.speed*1.6);
    const p=1+Math.sin(t*2.2)*0.05;
    nucleus.scale.setScalar(p);
    nHalo.scale.setScalar(6.5*p);
    nLight.intensity=2.8+Math.sin(t*2.2)*0.7;
    stars.rotation.y=t*0.01;stars.rotation.x=t*0.004;
    renderer.render(scene,camera);
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
